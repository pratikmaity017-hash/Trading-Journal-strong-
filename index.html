<!DOCTYPE html>
<html>
<head>

<title>Ultimate Trading Journal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.light{
background:white;
color:black;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:10px;
margin:5px;
background:#22c55e;
border:none;
border-radius:6px;
}

table{
width:90%;
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid white;
padding:8px;
}

img{
width:80px;
}

</style>

</head>

<body>

<h1>📈 Ultimate Trading Journal</h1>

<button onclick="toggleTheme()">Dark / Light</button>

<br><br>

<input id="entry" placeholder="Entry Price">
<input id="exit" placeholder="Exit Price">
<input id="qty" placeholder="Quantity">
<input id="logic" placeholder="Trade Logic">
<input type="file" id="img">

<button onclick="addTrade()">Add Trade</button>

<h2>Total Profit: ₹ <span id="profit">0</span></h2>
<h3>Win Rate: <span id="winrate">0</span>%</h3>

<button onclick="exportCSV()">Export Excel</button>

<table>

<thead>
<tr>
<th>Entry</th>
<th>Exit</th>
<th>Qty</th>
<th>P/L</th>
<th>Logic</th>
<th>Screenshot</th>
</tr>
</thead>

<tbody id="table"></tbody>

</table>

<canvas id="chart"></canvas>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || []

function saveTrades(){
localStorage.setItem("trades", JSON.stringify(trades))
}

function toggleTheme(){
document.body.classList.toggle("light")
}

function addTrade(){

let entry=parseFloat(document.getElementById("entry").value)
let exit=parseFloat(document.getElementById("exit").value)
let qty=parseFloat(document.getElementById("qty").value)
let logic=document.getElementById("logic").value

let file=document.getElementById("img").files[0]

let imgURL=""

if(file){
imgURL=URL.createObjectURL(file)
}

let pl=(exit-entry)*qty

let trade={entry,exit,qty,pl,logic,imgURL}

trades.push(trade)

saveTrades()

displayTrades()

}

function displayTrades(){

let table=document.getElementById("table")

table.innerHTML=""

let total=0
let win=0

let equity=[]

trades.forEach(t=>{

total+=t.pl

if(t.pl>0) win++

equity.push(total)

let row=`
<tr>
<td>${t.entry}</td>
<td>${t.exit}</td>
<td>${t.qty}</td>
<td>${t.pl}</td>
<td>${t.logic}</td>
<td><img src="${t.imgURL}"></td>
</tr>
`

table.innerHTML+=row

})

document.getElementById("profit").innerText=total

let winrate=trades.length?(win/trades.length*100).toFixed(1):0

document.getElementById("winrate").innerText=winrate

drawChart(equity)

}

function drawChart(data){

new Chart(document.getElementById("chart"),{

type:"line",

data:{
labels:data.map((_,i)=>i+1),
datasets:[{
label:"Equity Curve",
data:data
}]
}

})

}

function exportCSV(){

let csv="Entry,Exit,Qty,PL,Logic\n"

trades.forEach(t=>{
csv+=`${t.entry},${t.exit},${t.qty},${t.pl},${t.logic}\n`
})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="trades.csv"

a.click()

}

displayTrades()

</script>

</body>
</html>
