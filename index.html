<!DOCTYPE html>
<html>
<head>

<title>Pro Trading Journal</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.dashboard{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
width:200px;
}

input{
padding:10px;
margin:5px;
border-radius:6px;
border:none;
}

button{
padding:10px;
background:#22c55e;
border:none;
border-radius:6px;
margin:5px;
}

table{
width:90%;
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

td,th{
border:1px solid white;
padding:8px;
}

canvas{
background:white;
margin-top:30px;
}

.light{
background:white;
color:black;
}

</style>

</head>

<body>

<h1>📊 Pro Trading Journal Dashboard</h1>

<button onclick="toggleTheme()">Dark / Light</button>

<div class="dashboard">

<div class="card">
<h3>Total Profit</h3>
<h2 id="profit">0</h2>
</div>

<div class="card">
<h3>Win Rate</h3>
<h2 id="winrate">0%</h2>
</div>

<div class="card">
<h3>Total Trades</h3>
<h2 id="trades">0</h2>
</div>

</div>

<br>

<input id="entry" placeholder="Entry Price">
<input id="exit" placeholder="Exit Price">
<input id="qty" placeholder="Quantity">
<input id="strategy" placeholder="Strategy Name">

<button onclick="addTrade()">Add Trade</button>

<button onclick="exportCSV()">Export Excel</button>

<table>

<thead>

<tr>
<th>Entry</th>
<th>Exit</th>
<th>Qty</th>
<th>P/L</th>
<th>Strategy</th>

</tr>

</thead>

<tbody id="table"></tbody>

</table>

<canvas id="equityChart"></canvas>

<canvas id="pieChart"></canvas>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || []

function saveTrades(){
localStorage.setItem("trades", JSON.stringify(trades))
}

function toggleTheme(){
document.body.classList.toggle("light")
}

function addTrade(){

let entry=parseFloat(document.getElementById("entry").value)

let exit=parseFloat(document.getElementById("exit").value)

let qty=parseFloat(document.getElementById("qty").value)

let strategy=document.getElementById("strategy").value

let pl=(exit-entry)*qty

trades.push({entry,exit,qty,pl,strategy})

saveTrades()

displayTrades()

}

function displayTrades(){

let table=document.getElementById("table")

table.innerHTML=""

let total=0
let win=0

let equity=[]

trades.forEach(t=>{

total+=t.pl

if(t.pl>0) win++

equity.push(total)

let row=`
<tr>
<td>${t.entry}</td>
<td>${t.exit}</td>
<td>${t.qty}</td>
<td>${t.pl}</td>
<td>${t.strategy}</td>
</tr>
`

table.innerHTML+=row

})

document.getElementById("profit").innerText=total

document.getElementById("trades").innerText=trades.length

let winrate=trades.length?(win/trades.length*100).toFixed(1):0

document.getElementById("winrate").innerText=winrate+"%"

drawCharts(equity,win,trades.length-win)

}

function drawCharts(equity,win,loss){

new Chart(document.getElementById("equityChart"),{

type:"line",

data:{
labels:equity.map((_,i)=>i+1),
datasets:[{
label:"Equity Curve",
data:equity
}]
}

})

new Chart(document.getElementById("pieChart"),{

type:"pie",

data:{
labels:["Win","Loss"],
datasets:[{
data:[win,loss]
}]
}

})

}

function exportCSV(){

let csv="Entry,Exit,Qty,PL,Strategy\n"

trades.forEach(t=>{
csv+=`${t.entry},${t.exit},${t.qty},${t.pl},${t.strategy}\n`
})

let blob=new Blob([csv])

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="trades.csv"

a.click()

}

displayTrades()

</script>

</body>
</html>
